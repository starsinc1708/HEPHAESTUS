name: Publish Docker image

# Builds the SPA + API image and pushes it to GHCR so users can run HEPHAESTUS
# without building locally:  docker run -p 8765:8765 ghcr.io/starsinc1708/hephaestus
#
# NOTE: releases publish the image automatically from release-please.yml (its publish-image
# job). This workflow is the MANUAL / standalone path: run it via "Run workflow" (optionally
# pick a tag ref to get semver tags), or it fires when a human pushes a v* tag directly.
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR image names must be lowercase.
          images: ghcr.io/starsinc1708/hephaestus
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
