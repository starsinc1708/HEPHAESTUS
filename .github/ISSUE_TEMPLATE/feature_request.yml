name: Feature request
description: Suggest an improvement or new capability for HEPHAESTUS
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like HEPHAESTUS to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or current workarounds.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard / UI
        - Backend / API
        - Autonomous loop (agents/verify/merge)
        - Model / provider support
        - Setup / deployment
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
